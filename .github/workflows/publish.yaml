name: Publish

on:
  workflow_call:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3)'
        type: string
        required: true
      notes-b64:
        description: 'Base64-encoded release notes (Markdown)'
        type: string
        required: false
    secrets:
      github-token:
        description: 'GitHub Personal Access Token with repo scope for creating releases.'
        required: false

jobs:
  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # Resolve the tag from whichever trigger fired:
      #   push: tags                        → github.ref_name  (e.g. v1.2.3)
      #   workflow_dispatch / workflow_call → inputs.tag
      - name: Resolve tag
        id: vars
        run: echo "tag=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      # Checkout at the input tag so setuptools-scm sees it and stamps the
      # correct version into the wheel metadata.
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.vars.outputs.tag }}
          token: ${{ secrets.github-token || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Checkout publish workflow
        uses: actions/checkout@v6
        with:
          repository: ${{ github.action_repository}}
          ref: ${{ github.action_ref }}
          token: ${{ secrets.github-token || secrets.GITHUB_TOKEN }}
          path: ./.node-semantic-release

      - name: Publish release
        uses: ./.node-semantic-release
        with:
          publish: true
          github-token: ${{ secrets.github-token || secrets.GITHUB_TOKEN }}
          notes-b64: ${{ inputs.notes-b64 }}
          tag: ${{ steps.vars.outputs.tag }}
