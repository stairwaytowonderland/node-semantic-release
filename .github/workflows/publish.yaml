name: Publish

on:
  # Fires when a tag matching v* is pushed with personal credentials.
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3)'
        required: true
      notes-b64:
        description: 'Base64-encoded release notes (Markdown)'
        required: false

concurrency:
  group: '${{ github.repository_id }}-${{ github.ref_name }}'
  cancel-in-progress: false

jobs:
  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # Resolve the tag from whichever trigger fired:
      #   push: tags                        → github.ref_name  (e.g. v1.2.3)
      #   workflow_dispatch / workflow_call → inputs.tag
      - name: Resolve tag
        id: vars
        run: echo "tag=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      # Checkout at the input tag so setuptools-scm sees it and stamps the
      # correct version into the wheel metadata.
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.vars.outputs.tag }}
          fetch-depth: 0

      - name: Publish release
        uses: ./
        with:
          publish: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          notes-b64: ${{ inputs.notes-b64 || '' }}
          tag: ${{ steps.vars.outputs.tag }}
