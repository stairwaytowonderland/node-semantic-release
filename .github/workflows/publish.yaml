name: Publish

on:
  # Fires when a tag matching v* is pushed with personal credentials.
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3)'
        required: true
      notes-b64:
        description: 'Base64-encoded release notes (Markdown)'
        required: false

jobs:
  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # Resolve the tag from whichever trigger fired:
      #   push: tags                        → github.ref_name  (e.g. v1.2.3)
      #   workflow_dispatch / workflow_call → inputs.tag
      - name: Resolve tag
        id: vars
        run: echo "tag=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      # Checkout at the input tag so setuptools-scm sees it and stamps the
      # correct version into the wheel metadata.
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.vars.outputs.tag }}
          fetch-depth: 0

      - name: Decode release notes
        if: ${{ inputs.notes-b64 != '' }}
        run: printf '%s' "$NOTES_B64" | base64 -d > release-notes.md
        env:
          NOTES_B64: ${{ inputs.notes-b64 }}

      - name: Create or update release
        run: |
          tag="${{ steps.vars.outputs.tag }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release for $tag already exists."
            if [ -f release-notes.md ]; then
              gh release edit "$tag" \
                --title "$tag" \
                --notes-file release-notes.md
              echo "Updated existing release notes for $tag."
            else
              echo "No provided notes. Leaving existing release unchanged for $tag."
            fi
          else
            if [ -f release-notes.md ]; then
              gh release create "$tag" \
                --title "$tag" \
                --notes-file release-notes.md
            else
              gh release create "$tag" \
                --title "$tag" \
                --notes-from-tag
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
