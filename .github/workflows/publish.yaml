name: Publish

on:
  workflow_call:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3)'
        type: string
        required: true
      notes-b64:
        description: 'Base64-encoded release notes (Markdown)'
        type: string
        required: false

    secrets:
      github-token:
        description: 'GitHub Personal Access Token with repo scope for creating releases.'
        required: false

jobs:
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      release-url: ${{ steps.publish.outputs.release-url }}
      release-tag: ${{ steps.publish.outputs.release-tag }}
      release-sha: ${{ steps.publish.outputs.release-sha }}
      release-notes-b64: ${{ steps.publish.outputs.release-notes-b64 }}
      release-published: ${{ steps.publish.outputs.release-published }}

    steps:
      # Resolve the tag from whichever trigger fired:
      #   push: tags                        → github.ref_name  (e.g. v1.2.3)
      #   workflow_dispatch / workflow_call → inputs.tag
      - name: Resolve tag
        id: vars
        run: echo "tag=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      # Checkout at the input tag so setuptools-scm sees it and stamps the
      # correct version into the wheel metadata.
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.vars.outputs.tag }}
          persist-credentials: false
          # token: ${{ secrets.github-token || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Resolve auth strategy
        id: resolve-auth
        shell: bash
        run: |
          has_token=false
          if [ -n "$INPUT_GITHUB_TOKEN" ]; then
            has_token=true
          fi
          echo "has-token=$has_token" >> "$GITHUB_OUTPUT"

          can_generate_app_token=false
          if [ -n "$APP_PRIVATE_KEY" ] && [ -n "$APP_CLIENT_ID" ]; then
            can_generate_app_token=true
          fi
          echo "can-generate-app-token=$can_generate_app_token" >> "$GITHUB_OUTPUT"

          generate_app_token=false
          if ! $has_token && $can_generate_app_token; then
            generate_app_token=true
          fi
          echo "generate-app-token=$generate_app_token" >> "$GITHUB_OUTPUT"
        env:
          INPUT_GITHUB_TOKEN: ${{ secrets.github-token }}
          APP_PRIVATE_KEY: ${{ secrets.ORG_REPO_USER_PRIVATE_KEY }}
          APP_CLIENT_ID: ${{ vars.ORG_REPO_USER_APP_ID }}

      - name: Generate GitHub App Token
        id: generate-token
        if: steps.resolve-auth.outputs.generate-app-token == 'true'
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.ORG_REPO_USER_APP_ID }}
          private-key: ${{ secrets.ORG_REPO_USER_PRIVATE_KEY }}

      - name: Publish release
        id: publish
        uses: ./
        with:
          publish: true
          github-token: ${{ steps.resolve-auth.outputs.generate-app-token == 'true' && steps.generate-token.outputs.token || secrets.github-token }}
          notes-b64: ${{ inputs.notes-b64 }}
          tag: ${{ steps.vars.outputs.tag }}
