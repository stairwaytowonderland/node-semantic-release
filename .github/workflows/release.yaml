name: Release

on:
  workflow_call:
    inputs:
      dispatch-workflow:
        description: 'The workflow file to dispatch after a successful release.'
        type: string
        required: false
      fail-on-no-release:
        description: 'Fail the workflow if no release is published (e.g. if there are no relevant commits).'
        type: boolean
        required: false
        default: false
      changelog-file:
        description: 'Path to the generated changelog file to commit when using manual-tag mode.'
        type: string
        required: false
      additional-assets-json:
        description: 'Additional files to commit when using manual-tag mode (e.g. package.json).'
        type: string
        required: false
    secrets:
      github-token:
        description: 'GitHub Personal Access Token with repo scope for creating releases.'
        required: false

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write

    outputs:
      new-release-published: ${{ steps.release.outputs.new-release-published }}
      new-release-version: ${{ steps.release.outputs.new-release-version }}
      new-release-git-tag: ${{ steps.release.outputs.new-release-git-tag }}
      new-release-notes: ${{ steps.release.outputs.new-release-notes }}
      new-release-notes-base64: ${{ steps.release.outputs.new-release-notes-base64 }}

    steps:
      - name: Set vars
        id: vars
        run: |
          echo "is-dispatch-workflow=$IS_DISPATCH_WORKFLOW" >> "$GITHUB_OUTPUT"
        env:
          IS_DISPATCH_WORKFLOW: ${{ inputs.dispatch-workflow != '' }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve auth strategy
        id: resolve-auth
        shell: bash
        run: |
          has_token=false
          if [ -n "$INPUT_GITHUB_TOKEN" ]; then
            has_token=true
          fi
          echo "has-token=$has_token" >> "$GITHUB_OUTPUT"

          can_generate_app_token=false
          if [ -n "$APP_PRIVATE_KEY" ] && [ -n "$APP_CLIENT_ID" ]; then
            can_generate_app_token=true
          fi
          echo "can-generate-app-token=$can_generate_app_token" >> "$GITHUB_OUTPUT"

          generate_app_token=false
          if ! $has_token && $can_generate_app_token; then
            generate_app_token=true
          fi
          echo "generate-app-token=$generate_app_token" >> "$GITHUB_OUTPUT"
        env:
          INPUT_GITHUB_TOKEN: ${{ secrets.github-token }}
          APP_PRIVATE_KEY: ${{ secrets.ORG_REPO_USER_PRIVATE_KEY }}
          APP_CLIENT_ID: ${{ vars.ORG_REPO_USER_APP_ID }}

      - name: Generate GitHub App Token
        id: generate-token
        if: steps.resolve-auth.outputs.generate-app-token == 'true'
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.ORG_REPO_USER_APP_ID }}
          private-key: ${{ secrets.ORG_REPO_USER_PRIVATE_KEY }}

      - name: Semantic release
        id: release
        uses: ./
        with:
          github-token: ${{ steps.resolve-auth.outputs.generate-app-token == 'true' && steps.generate-token.outputs.token || secrets.github-token }}
          changelog-file: ${{ inputs.changelog-file }}
          additional-assets-json: ${{ inputs.additional-assets-json }}

      - name: Release failed
        if: steps.release.outputs.new-release-published != 'true' && inputs.fail-on-no-release
        uses: actions/github-script@v9
        with:
          script: |
            core.setFailed('Release failed')

      - name: Dispatch Publish workflow
        if: steps.release.outputs.new-release-published == 'true' && steps.vars.outputs.is-dispatch-workflow == 'true'
        uses: stairwaytowonderland/simple-workflow-dispatch@main
        with:
          workflow: ${{ inputs.dispatch-workflow }}
          tag: ${{ steps.release.outputs.new-release-git-tag }}
          fields: |
            notes-b64=${{ steps.release.outputs.new-release-notes-base64 }}
