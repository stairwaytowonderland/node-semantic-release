name: Release

on:
  # push:
  #   branches: [main]
  # workflow_dispatch:
  workflow_call:
    inputs:
      dispatch-workflow:
        description: 'The workflow file to dispatch after a successful release.'
        type: string
        required: false
        default: ''
    secrets:
      github-token:
        description: 'GitHub Personal Access Token with repo scope for creating releases.'
        required: false

env:
  TOKEN: ${{ secrets.github-token }}

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Setup | Set TOKEN env var
        run: |
          if [ -n "${{ secrets.github-token }}" ]; then
            echo "TOKEN=${{ secrets.github-token }}" >> $GITHUB_ENV
          else
            echo "TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ env.TOKEN }}
          persist-credentials: false

      - name: Force branch to workflow SHA
        shell: bash
        # Guards against commits landing while this run was queued.
        run: git reset --hard ${{ github.sha }}

      - name: Semantic release
        id: release
        uses: ./
        with:
          github-token: ${{ env.TOKEN }}

      - name: Dispatch Publish workflow
        if: steps.release.outputs.new-release-published == 'true' && inputs.dispatch-workflow != ''
        uses: stairwaytowonderland/simple-workflow-dispatch@main
        with:
          workflow: ${{ inputs.dispatch-workflow }}
          tag: ${{ steps.release.outputs.new-release-git-tag }}
          fields: |
            notes-b64=${{ steps.release.outputs.new-release-notes-base64 }}
