name: Release

on:
  # push:
  #   branches: [main]
  # workflow_dispatch:
  workflow_call:
    inputs:
      dispatch-workflow:
        description: 'The workflow file to dispatch after a successful release.'
        type: string
        required: false
        default: ''
      manual-tag:
        description: 'Manually create the release tag instead of letting semantic-release do it.'
        type: boolean
        required: false
        default: false
      fail-on-no-release:
        description: 'Fail the workflow if no release is published (e.g. if there are no relevant commits).'
        type: boolean
        required: false
        default: false
    secrets:
      github-token:
        description: 'GitHub Personal Access Token with repo scope for creating releases.'
        required: false

env:
  TOKEN: ${{ secrets.github-token }}

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write

    outputs:
      new-release-published: ${{ steps.release.outputs.new-release-published }}
      new-release-version: ${{ steps.release.outputs.new-release-version }}
      new-release-git-tag: ${{ steps.release.outputs.new-release-git-tag }}
      new-release-notes: ${{ steps.release.outputs.new-release-notes }}
      new-release-notes-base64: ${{ steps.release.outputs.new-release-notes-base64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.github-token || secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Force branch to workflow SHA
        shell: bash
        # Guards against commits landing while this run was queued.
        run: git reset --hard ${{ github.sha }}

      - name: Semantic release
        id: release
        uses: ./
        with:
          github-token: ${{ secrets.github-token || secrets.GITHUB_TOKEN }}
          manual-tag: ${{ inputs.manual-tag }}

      - name: Release failed
        if: steps.release.outputs.new-release-published != 'true' && inputs.fail-on-no-release
        uses: actions/github-script@v9
        with:
          script: |
            core.setFailed('Release failed')

      - name: Dispatch Publish workflow
        if: steps.release.outputs.new-release-published == 'true' && inputs.dispatch-workflow != ''
        uses: stairwaytowonderland/simple-workflow-dispatch@main
        with:
          workflow: ${{ inputs.dispatch-workflow }}
          tag: ${{ steps.release.outputs.new-release-git-tag }}
          fields: |
            notes-b64=${{ steps.release.outputs.new-release-notes-base64 }}
