name: CI

on:
  push:
    # Fires when a tag matching v* is pushed with personal credentials.
    tags: ['v*']
    branches: [main]
    paths-ignore:
      - 'CHANGELOG.md'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:
    inputs:
      fail-on-no-release:
        description: 'Fail the workflow if no release is published (e.g. if there are no relevant commits).'
        type: boolean
        required: false
        default: true
      publish:
        description: 'Whether to run in publish mode.'
        type: boolean
        required: false
        default: false

concurrency:
  group: '${{ github.repository_id }}-${{ github.ref_name }}'
  cancel-in-progress: true

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

# Use PAT instead of GITHUB_TOKEN to cause semantic-release to trigger tag pipeline when tag is created.
# 'Fine-grained token' repo permissions: Contents

jobs:
  meta:
    name: Meta
    uses: stairwaytowonderland/actions/.github/workflows/ci-meta.yaml@v1
    permissions:
      contents: read
    with:
      publish: ${{ inputs.publish == true }}

  release:
    name: Release
    needs: [meta]
    if: needs.meta.outputs.is-release-workflow == 'true'
    uses: ./.github/workflows/release.yaml
    secrets: inherit
    with:
      dispatch-workflow: ${{ needs.meta.outputs.has-release-tags != 'true' && 'ci.yaml' || '' }}
      fail-on-no-release: ${{ inputs.fail-on-no-release == true }}

  publish:
    name: Publish
    needs: [meta]
    if: needs.meta.outputs.is-publish-workflow == 'true'
    uses: ./.github/workflows/publish.yaml
    secrets: inherit
    permissions:
      contents: write
    with:
      tag: ${{ github.ref_name }}

  normalize-majorver:
    name: Normalize Major Version Tag
    needs: [publish]
    if: (needs.publish.outputs.release-published == 'true' && github.event_name == 'workflow_dispatch') || startsWith(github.ref, 'refs/tags/v')
    uses: stairwaytowonderland/actions/.github/workflows/normalize-majorver.yaml@v1
    permissions:
      contents: write
