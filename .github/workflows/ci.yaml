name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'CHANGELOG.md'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:
    inputs:
      changelog-file:
        description: 'Path to the generated changelog file to commit when using manual-tag mode.'
        type: string
        required: false
        default: 'CHANGELOG.md'
      additional-assets-json:
        description: 'Additional files to commit when using manual-tag mode (e.g. package.json).'
        type: string
        required: false
        default: '["package.json","package-lock.json"]'
      fail-on-no-release:
        description: 'Fail the workflow if no release is published (e.g. if there are no relevant commits).'
        type: boolean
        required: false
        default: true

# Use PAT instead of GITHUB_TOKEN to cause semantic-release to trigger tag pipeline when tag is created.
# 'Fine-grained token' repo permissions: Contents

jobs:
  debug:
    name: Debug event info
    runs-on: ubuntu-latest
    steps:
      - name: Print event info
        run: |
          printf "Event name: %s\n" "$GITHUB_EVENT_NAME"
          printf "Head commit author name:\n%s\n" "$HEAD_COMMIT_AUTHOR_NAME"
          printf "Head commit message:\n%s\n" "$HEAD_COMMIT_MESSAGE"
        env:
          HEAD_COMMIT_AUTHOR_NAME: ${{ github.event.head_commit.author.name }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
  release:
    name: Release
    uses: ./.github/workflows/release.yaml
    with:
      # dispatch-workflow: publish.yaml
      fail-on-no-release: false
      changelog-file: ${{ inputs.changelog-file || 'CHANGELOG.md' }}
      additional-assets-json: ${{ inputs.additional-assets-json || '["package.json","package-lock.json"]' }}
    secrets:
      github-token: ${{ secrets.GH_PAT_CREATE_RELEASE }}
