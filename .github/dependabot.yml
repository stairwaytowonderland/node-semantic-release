version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      # interval: "monthly"
      # day: "friday"
      interval: 'daily'
    commit-message:
      prefix: 'ci'
      include: 'scope' # Automatically appends "(deps)" -> ci(deps):
    labels: ['dependencies', 'deps:github-actions']
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - '*'
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      # interval: "monthly"
      # day: "friday"
      interval: 'daily'
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    commit-message:
      prefix: 'chore'
      include: 'scope' # Automatically appends "(deps)" -> chore(deps):
    labels: ['dependencies', 'deps:javascript']
    groups:
      npm:
        applies-to: version-updates
        patterns:
          - '*'
