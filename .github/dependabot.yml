version: 2
registries:
  # https://docs.github.com/en/code-security/how-tos/secure-your-supply-chain/manage-your-dependency-security/configure-access-to-private-registries#git
  github:
    type: git
    url: https://github.com/
    username: x-access-token
    password: ${{ secrets.GH_PAT_DEPENDABOT }}
  # https://docs.github.com/en/code-security/how-tos/secure-your-supply-chain/manage-your-dependency-security/configure-access-to-private-registries#npm-registry
  npm-github:
    type: npm-registry
    url: https://npm.pkg.github.com
    token: ${{ secrets.GH_PAT_DEPENDABOT }}
    replaces-base: true
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    exclude-paths:
      - '.github/workflows/*'
      - '.github/actions/**'
    schedule:
      # interval: "monthly"
      # day: "friday"
      interval: 'daily'
    commit-message:
      prefix: 'ci'
      include: 'scope' # Automatically appends "(deps)" -> ci(deps):
    labels: ['dependencies', 'deps:github-actions']
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - '*'
  - package-ecosystem: 'github-actions'
    directories:
      - '.github/workflows'
      - '.github/actions/**'
    schedule:
      # interval: "monthly"
      # day: "friday"
      interval: 'daily'
    commit-message:
      prefix: 'chore'
      include: 'scope' # Automatically appends "(deps)" -> ci(deps):
    labels: ['dependencies', 'deps:github-actions']
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - '*'
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      # interval: "monthly"
      # day: "friday"
      interval: 'daily'
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    commit-message:
      prefix: 'chore'
      include: 'scope' # Automatically appends "(deps)" -> chore(deps):
    labels: ['dependencies', 'deps:javascript']
    groups:
      npm:
        applies-to: version-updates
        patterns:
          - '*'
