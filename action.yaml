name: Node Semantic Release
description: >
  Builds the project with npm, runs semantic-release, and base64-encodes the
  release notes for safe transport.
author: stairwaytowonderland
inputs:
  github-token:
    description: GitHub token passed to semantic-release (requires repo + write access).
    required: false
    default: ''
  node-version:
    description: Node.js version to use.
    required: false
    default: '24'
  build-only:
    description: Run the build step but skip the release step (for testing).
    required: false
  manual-tag:
    description: Manually create the release tag instead of letting semantic-release do it.
    required: false
  typecheck:
    description: Run typechecking but skip the release step (for testing).
    required: false

outputs:
  new-release-published:
    description: |
      'true' if a new release was published.
    value: ${{ steps.normalize.outputs.new-release-published }}
  new-release-version:
    description: Version number of the new release (e.g. 1.2.3).
    value: ${{ steps.normalize.outputs.new-release-version }}
  new-release-git-tag:
    description: Git tag of the new release (e.g. v1.2.3).
    value: ${{ steps.normalize.outputs.new-release-git-tag }}
  # new-release-notes:
  #   description: Release notes (Markdown) of the new release.
  #   value: ${{ steps.normalize.outputs.new-release-notes }}
  new-release-notes-base64:
    description: Base64-encoded release notes.
    value: ${{ steps.encode.outputs.notes_b64 }}

runs:
  using: composite
  steps:
    # - name: Check token input
    #   if: inputs.build-only != 'true' && inputs.github-token == ''
    #   shell: bash
    #   run: |
    #     echo "::error::github-token input is required to publish a release. Provide a token with repo + write access."
    #     exit 1

    - name: Checkout action repository
      uses: actions/checkout@v6
      with:
        # fetch-depth: 0
        ref: ${{ github.action_ref }}
        # token: ${{ inputs.github-token }}
        repository: ${{ github.action_repository }}
        path: ./.node-semantic-release

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Ensure package.json
      shell: bash
      run: |
        if [ ! -f package.json ]; then
          echo "::warning::package.json not found. Copying default configuration."
          cp ./.node-semantic-release/templates/package.json ./package.json
          npm install --package-lock-only
        fi

    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Build
      shell: bash
      run: npm run build

    - name: Type check
      if: inputs.typecheck == 'true'
      shell: bash
      run: npm run typecheck

    - name: Check 'semantic-release-export-data' plugin
      if: inputs.build-only != 'true'
      shell: bash
      run: |
        if ! node -e "require('semantic-release-export-data')" 2>/dev/null; then
          echo "::error::semantic-release-export-data is not installed. Add it to package.json and ensure it is listed in your semantic-release plugins (e.g. '.releaserc')."
          exit 1
        fi

    - name: Ensure .releaserc
      if: inputs.build-only != 'true'
      shell: bash
      run: |
        if [ ! -f .releaserc ]; then
          echo "::warning::.releaserc not found. Copying default configuration."
          cp ./.node-semantic-release/templates/releaserc.json ./.releaserc
        fi

    - name: Get next version
      if: inputs.build-only != 'true' && inputs.manual-tag == 'true'
      id: get-next-version
      shell: bash
      run: npx semantic-release --dry-run
      env:
        GITHUB_TOKEN: ${{ inputs.github-token || github.token }}

    - name: Release
      if: inputs.build-only != 'true' && inputs.manual-tag != 'true'
      id: release
      shell: bash
      run: npx semantic-release
      env:
        GITHUB_TOKEN: ${{ inputs.github-token || github.token }}

    - name: Normalize outputs
      if: inputs.build-only != 'true'
      id: normalize
      shell: bash
      run: |
        echo "new-release-published=${{ steps.release.outputs.new-release-published || steps.get-next-version.outputs.new-release-published }}" >> "$GITHUB_OUTPUT"
        echo "new-release-version=${{ steps.release.outputs.new-release-version || steps.get-next-version.outputs.new-release-version }}" >> "$GITHUB_OUTPUT"
        echo "new-release-git-tag=${{ steps.release.outputs.new-release-git-tag || steps.get-next-version.outputs.new-release-git-tag }}" >> "$GITHUB_OUTPUT"

    - name: Encode release notes
      if: steps.normalize.outputs.new-release-published == 'true' && inputs.build-only != 'true'
      id: encode
      shell: bash
      # Encode the new release notes as a base64 string to safely
      # pass through the workflow dispatch fields.
      run: printf '%s' "$NOTES" | base64 -w 0 | xargs -I{} echo "notes_b64={}" >> "$GITHUB_OUTPUT"
      # The release notes from steps.normalize.outputs.new-release-notes
      # can contain arbitrary Markdown — newlines, special characters,
      # quotes — that would break if interpolated directly into the run
      # command via ${{ }}. Passing it through an environment variable
      # lets the shell handle it safely as a raw string.
      env:
        NOTES: ${{ steps.release.outputs.new-release-notes || steps.get-next-version.outputs.new-release-notes }}

    - name: Configure git
      if: steps.normalize.outputs.new-release-published == 'true' && inputs.build-only != 'true' && inputs.manual-tag == 'true'
      shell: bash
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
        # git config --global user.name "${{ github.actor }}"
        # git config --global user.email "${{ github.actor }}@users.noreply.github.com"
      env:
        GITHUB_TOKEN: ${{ inputs.github-token || github.token }}

    - name: Create tag
      if: steps.normalize.outputs.new-release-git-tag != '' && inputs.build-only != 'true' && inputs.manual-tag == 'true'
      shell: bash
      run: |
        # Build the tag message: header + blank line + decoded release notes + final newline
        {
          printf 'chore(release): %s [skip ci]\n' "${{ steps.normalize.outputs.new-release-version }}"
          printf '\n'
          printf '%s' "$NOTES_B64" | base64 -d
          printf '\n'
        } > release-notes.md

        echo "=== Tag message content ==="
        cat release-notes.md
        echo "=== End tag message ==="

        git tag -a ${{ steps.normalize.outputs.new-release-git-tag }} ${{ github.sha }} -F release-notes.md
        git push origin ${{ steps.normalize.outputs.new-release-git-tag }}
      env:
        NOTES_B64: ${{ steps.encode.outputs.notes_b64 }}

branding:
  icon: tag
  color: red
