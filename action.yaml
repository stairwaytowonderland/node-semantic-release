name: Node Semantic Release
description: >
  Builds the project with npm, runs semantic-release, and base64-encodes the
  release notes for safe transport.
author: stairwaytowonderland
inputs:
  github-token:
    description: GitHub token passed to semantic-release (requires repo + write access).
    required: false
    default: ${{ github.token }}
  node-version:
    description: Node.js version to use.
    required: false
    default: '24'
  build-only:
    description: Run the build step but skip the release step (for testing).
    required: false
  dry-run:
    description: Run semantic-release in dry-run mode (for testing).
    required: false
  typecheck:
    description: Run typechecking but skip the release step (for testing).
    required: false
  changelog-file:
    description: Path to the generated changelog file to commit when using manual-tag mode.
    required: false
    default: 'CHANGELOG.md'
  additional-assets-json:
    description: 'Additional files to commit when using manual-tag mode (e.g. package.json).'
    required: false
    default: '["package.json","package-lock.json"]'
  manual-tag:
    description: Manually create the release tag instead of letting semantic-release do it (for testing).
    required: false
  commit-author:
    description: >
      Git author for commits made by semantic-release when creating a release
      (e.g. "github-actions[bot]");
      Leave empty to use original author.
    required: false
    default: 'semantic-release-bot'
  commit-email:
    description: >
      Git email for commits made by semantic-release when creating a release
      (e.g. "41898282+github-actions[bot]@users.noreply.github.com");
      Leave empty to use original author email.
    required: false
    default: 'semantic-release-bot@martynus.net'
  commit-prefix:
    description: >
      Prefix for the commit message when semantic-release creates a release commit
      (e.g. "chore(release):").
    required: false
    default: 'chore(release): '
  publish:
    description: Dispatch the publish workflow after a successful release.
    required: false
  notes-b64:
    description: Base64-encoded release notes to pass to the publish workflow.
    required: false
  tag:
    description: The git tag or ref to use for publish.
    required: false
    default: ${{ github.ref_name }}
  # ref:
  #   description: The git tag or ref to use for publish.
  #   required: false
  #   default: ${{ github.ref_name }}

outputs:
  new-release-published:
    description: |
      'true' if a new release was published.
    value: ${{ steps.release.outputs.new-release-published }}
  new-release-version:
    description: Version number of the new release (e.g. 1.2.3).
    value: ${{ steps.release.outputs.new-release-version }}
  new-release-git-tag:
    description: Git tag of the new release (e.g. v1.2.3).
    value: ${{ steps.release.outputs.new-release-git-tag }}
  new-release-notes:
    description: Release notes (Markdown) of the new release.
    value: ${{ steps.release.outputs.new-release-notes }}
  new-release-notes-base64:
    description: Base64-encoded release notes.
    value: ${{ steps.encode.outputs.notes-b64 }}
  release-url:
    description: URL of the new release on GitHub.
    value: ${{ steps.publish.outputs.release-url }}
  release-tag:
    description: Git tag of the release that was published (e.g. v1.2.3).
    value: ${{ steps.verify.outputs.tag }}
  release-sha:
    description: Git SHA of the release tag that was published.
    value: ${{ steps.verify.outputs.sha }}
  release-notes-b64:
    description: Base64-encoded release notes of the release that was published.
    value: ${{ steps.publish.outputs.release-notes-b64 }}
  release-published:
    description: "'true' if the release was published."
    value: ${{ steps.publish.outputs.published }}

runs:
  using: composite
  steps:
    - name: Ensure .releaserc
      if: inputs.publish != 'true'
      shell: bash
      run: |
        if [ ! -f "${GITHUB_WORKSPACE}/.releaserc" ] && [ ! -f "${GITHUB_WORKSPACE}/.releaserc.json" ] && [ ! -f "${GITHUB_WORKSPACE}/.releaserc.yaml" ] && [ ! -f "${GITHUB_WORKSPACE}/.releaserc.config.js" ]; then
          echo "::warning::.releaserc not found. Copying default configuration."
          echo "::notice::Used default .releaserc. Please add a .releaserc file to customize your release process."
          cp "${GITHUB_ACTION_PATH}/templates/releaserc.json" "${GITHUB_WORKSPACE}/.releaserc"
        fi

    - name: Ensure package.json
      if: inputs.publish != 'true'
      shell: bash
      run: |
        if [ ! -f "${GITHUB_WORKSPACE}/package.json" ]; then
          echo "::warning::package.json not found. Copying default configuration."
          echo "::notice::Used default package.json. Please add a package.json file to customize your project."
          cp "${GITHUB_ACTION_PATH}/templates/package.json" "${GITHUB_WORKSPACE}/"
        fi

    - name: Has dependency lock file
      id: validate
      if: inputs.publish != 'true'
      shell: bash
      run: |
        if [ -f "${GITHUB_WORKSPACE}/package-lock.json" ]; then
          echo "has-lock-file=true" >> "$GITHUB_OUTPUT"
        else
          echo "has-lock-file=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup Node.js with cache
      if: inputs.publish != 'true'
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ steps.validate.outputs.has-lock-file == 'true' && 'npm' || '' }}

    - name: Ensure package-lock.json
      if: inputs.publish != 'true' && steps.validate.outputs.has-lock-file == 'false'
      shell: bash
      run: |
        echo "::warning::package-lock.json not found. Generating lock file with 'npm install'."
        npm install --package-lock-only

    - name: Install dependencies
      if: inputs.publish != 'true'
      shell: bash
      run: npm ci

    - name: Build
      if: inputs.publish != 'true'
      shell: bash
      run: npm run build

    - name: Type check
      if: inputs.publish != 'true' && inputs.typecheck == 'true'
      shell: bash
      run: npm run typecheck

    - name: Check 'semantic-release-export-data' plugin
      if: inputs.publish != 'true' && inputs.build-only != 'true'
      shell: bash
      run: |
        if ! node -e "require('semantic-release-export-data')" 2>/dev/null; then
          echo "::error::semantic-release-export-data is not installed. Add it to package.json and ensure it is listed in your semantic-release plugins (e.g. '.releaserc')."
          exit 1
        fi

    - name: Release
      if: inputs.publish != 'true' && inputs.build-only != 'true'
      id: release
      shell: bash
      run: |
        # Force Git remote to point to the caller repository using the input token
        git remote set-url origin https://x-access-token:${GH_TOKEN}@://github.com/${GITHUB_REPOSITORY}.git
        npx semantic-release ${DRY_RUN_FLAG}
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        DRY_RUN_FLAG: ${{ inputs.manual-tag == 'true' || inputs.dry-run == 'true' && '--dry-run' || '' }}

    - name: Set notes file
      if: steps.release.outputs.new-release-published == 'true'
      id: notes
      shell: bash
      run: |
        cat > "$NOTES_FILE" <<EOF
        ${NOTES}
        EOF
        echo "notes-file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"
      env:
        NOTES: ${{ steps.release.outputs.new-release-notes }}
        NOTES_FILE: ./.release-notes.md

    - name: Encode release notes
      if: steps.release.outputs.new-release-published == 'true'
      id: encode
      shell: bash
      # Encode the new release notes as a base64 string to safely
      # pass through the workflow dispatch fields.
      run: printf '%s' "$NOTES" | base64 -w 0 | xargs -I{} echo "notes-b64={}" >> "$GITHUB_OUTPUT"
      # The release notes from steps.release.outputs.new-release-notes
      # can contain arbitrary Markdown — newlines, special characters,
      # quotes — that would break if interpolated directly into the run
      # command via ${{ }}. Passing it through an environment variable
      # lets the shell handle it safely as a raw string.
      env:
        NOTES: ${{ steps.release.outputs.new-release-notes }}

    - name: Update CHANGELOG
      if: steps.release.outputs.new-release-published == 'true' && inputs.manual-tag == 'true' && inputs.changelog-file != ''
      id: changelog
      shell: bash
      run: |
        if [ -f "$CHANGELOG_FILE" ]; then
          cp "$CHANGELOG_FILE" "${CHANGELOG_FILE}.bak"
          {
            cat "$NOTES_FILE"
            cat "${CHANGELOG_FILE}.bak"
          } > "$CHANGELOG_FILE"
          rm -f "${CHANGELOG_FILE}.bak"
        else
          printf '%s\n' "$NOTES" > "$CHANGELOG_FILE"
        fi
      env:
        NOTES_FILE: ${{ steps.notes.outputs.notes-file }}
        CHANGELOG_FILE: ${{ inputs.changelog-file }}

    - name: Update version
      if: steps.release.outputs.new-release-published == 'true' && inputs.manual-tag == 'true'
      shell: bash
      run: npm version ${VERSION} --no-git-tag-version
      env:
        VERSION: ${{ steps.release.outputs.new-release-version }}

    - name: Configure git
      if: steps.release.outputs.new-release-published == 'true' && inputs.manual-tag == 'true'
      shell: bash
      run: |
        git config --global commit.cleanup verbatim
        git config --global user.name "$COMMIT_AUTHOR"
        git config --global user.email "$COMMIT_EMAIL"
        # git config --global user.name "github-actions[bot]"
        # git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        # git config --global user.name "semantic-release-bot"
        # git config --global user.email "semantic-release-bot@martynus.net"

        git config --global core.excludesfile "$EXCLUDE_FILE"
        echo "$NOTES_FILE" >> "$EXCLUDE_FILE"
      env:
        COMMIT_AUTHOR: ${{ inputs.commit-author || github.actor }}
        COMMIT_EMAIL: ${{ inputs.commit-email || format('{0}@{1}', github.actor, 'users.noreply.github.com') }}
        NOTES_FILE: ${{ steps.notes.outputs.notes-file }}
        EXCLUDE_FILE: ./.gitignore_global

    - name: Prepare commit assets
      if: steps.release.outputs.new-release-published == 'true' && inputs.manual-tag == 'true'
      id: prepare-assets
      shell: bash
      run: |
        if [ -n "$ASSETS_JSON" ]; then
          # Convert JSON array to space-separated string
          additional_assets=$(echo "$ASSETS_JSON" | jq -r '.[]' | xargs echo)
          [ -z "$additional_assets" ] || assets="$CHANGELOG_FILE $additional_assets"
        else
          [ -z "$CHANGELOG_FILE" ] || assets="$CHANGELOG_FILE"
        fi
        echo "assets=$assets" >> "$GITHUB_OUTPUT"
      env:
        ASSETS_JSON: ${{ inputs.additional-assets-json }}
        CHANGELOG_FILE: ${{ inputs.changelog-file }}

    - name: Commit assets
      if: steps.prepare-assets.outputs.assets != ''
      id: commit-assets
      shell: bash
      run: |
        git add "$ASSETS"
        if git diff --cached --quiet; then
          echo "No changes to commit."
        else
          COMMIT_MESSAGE="${COMMIT_PREFIX}${VERSION}"
          if [ -n "$NOTES" ]; then
            notes="$NOTES"
            COMMIT_MESSAGE="$(cat <<EOF
        $COMMIT_MESSAGE

        $notes
        EOF
            )"
          fi
          git commit -m "$COMMIT_MESSAGE"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
        fi
      env:
        VERSION: ${{ steps.release.outputs.new-release-version }}
        NOTES: ${{ steps.release.outputs.new-release-notes }}
        ASSETS: ${{ steps.prepare-assets.outputs.assets }}
        COMMIT_PREFIX: ${{ inputs.commit-prefix }}

    - name: Create tag
      if: steps.release.outputs.new-release-published == 'true' && inputs.manual-tag == 'true'
      shell: bash
      run: |
        git tag -a "$TAG" "$SHA" -F "$NOTES_FILE"
        git push origin refs/tags/$TAG
      env:
        TAG: ${{ steps.release.outputs.new-release-git-tag }}
        SHA: ${{ steps.commit-assets.outputs.commit_sha }}
        NOTES_FILE: ${{ steps.notes.outputs.notes-file }}

    - name: Show release information
      if: steps.release.outputs.new-release-published == 'true'
      shell: bash
      run: |
        if [ "$MANUAL_TAG" = "true" ]; then
          echo "::notice::🚀 Tag created successfully!"
        elif [ "$DRY_RUN" = "true" ]; then
          echo "::notice::🚀 Dry run successful! No release was published, but everything looks good."
        else
          echo "::notice::🚀 Release triggered successfully!"
        fi
        if [ -n "$NOTES" ]; then
          echo "> [!TIP]" >> $GITHUB_STEP_SUMMARY
          echo "> ### Release Information" >> $GITHUB_STEP_SUMMARY
          echo "> ✅ **Version**: ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "> 🏷️ **Git tag**: ${TAG}" >> $GITHUB_STEP_SUMMARY
          echo "> 📝 **Release Notes**:" >> $GITHUB_STEP_SUMMARY
          echo "> " >> $GITHUB_STEP_SUMMARY
          echo "::group::📝 Release Notes"
          printf ">   > \n" >> $GITHUB_STEP_SUMMARY
          while IFS= read -r line; do
            printf '%s\n' "$line" | sed 's/^/>\ /' | tee -a $GITHUB_STEP_SUMMARY
          done < <(printf '%s\n' "$NOTES")
          echo "::endgroup::"
        fi
      env:
        TAG: ${{ steps.release.outputs.new-release-git-tag }}
        VERSION: ${{ steps.release.outputs.new-release-version }}
        NOTES: ${{ steps.release.outputs.new-release-notes }}
        MANUAL_TAG: ${{ inputs.manual-tag }}
        DRY_RUN: ${{ inputs.dry-run }}

    - name: Verify tag
      if: inputs.publish == 'true'
      id: verify
      shell: bash
      run: |
        TAG_SHA=$(git rev-parse --verify "$TAG")
        echo "sha=$TAG_SHA" >> "$GITHUB_OUTPUT"
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      env:
        TAG: ${{ inputs.tag }}

    - name: Get release notes from tag
      if: inputs.publish == 'true' && inputs.notes-b64 == ''
      id: parse
      shell: bash
      run: git tag -l --format='%(contents)' "$TAG" > release-notes.md
      env:
        TAG: ${{ steps.verify.outputs.tag }}

    - name: Decode release notes
      if: inputs.publish == 'true' && inputs.notes-b64 != ''
      id: decode
      shell: bash
      run: printf '%s' "$NOTES_B64" | base64 -d > release-notes.md
      env:
        NOTES_B64: ${{ inputs.notes-b64 }}

    - name: Create release
      if: inputs.publish == 'true'
      id: publish
      shell: bash
      run: |
        if [ -f release-notes.md ]; then
          RELEASE_URL=$(gh release create "${{ steps.verify.outputs.tag }}" \
            --title "${{ steps.verify.outputs.tag }}" \
            --notes-file release-notes.md)
            notes="$(cat release-notes.md)"
            printf '%s' "$notes" | base64 -w 0 | xargs -I{} echo "notes-b64={}" >> "$GITHUB_OUTPUT"
        else
          RELEASE_URL=$(gh release create "${{ steps.verify.outputs.tag }}" \
            --title "${{ steps.verify.outputs.tag }}" \
            --notes-from-tag)
        fi
        echo "release-url=$RELEASE_URL" >> "$GITHUB_OUTPUT"
        echo "published=true" >> "$GITHUB_OUTPUT"
      env:
        GH_TOKEN: ${{ inputs.github-token }}

    - name: Show publish information
      if: inputs.publish == 'true'
      shell: bash
      run: |
        echo "::notice::🚀 Release '${TAG}' created successfully! View it at $RELEASE_URL"
        if [ -f release-notes.md ]; then
          echo "> [!TIP]" >> $GITHUB_STEP_SUMMARY
          echo "> ### Release Information" >> $GITHUB_STEP_SUMMARY
          echo "> 🏷️ **Git tag**: ${TAG}" >> $GITHUB_STEP_SUMMARY
          echo "> 🔗 **Release URL**: ${RELEASE_URL}" >> $GITHUB_STEP_SUMMARY
          echo "> 📝 **Release Notes**:" >> $GITHUB_STEP_SUMMARY
          echo "> " >> $GITHUB_STEP_SUMMARY
          echo "::group::📝 Release Notes"
          while IFS= read -r line; do
            printf '%s\n' "$line" | sed 's/^/>\ /' | tee -a $GITHUB_STEP_SUMMARY
          done < release-notes.md
          echo "::endgroup::"
          rm -f release-notes.md
        fi
      env:
        TAG: ${{ steps.verify.outputs.tag }}
        RELEASE_URL: ${{ steps.publish.outputs.release-url }}

branding:
  icon: tag
  color: red
