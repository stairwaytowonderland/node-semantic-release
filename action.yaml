name: Node Semantic Release
description: >
  Builds the project with npm, runs semantic-release, and base64-encodes the
  release notes for safe transport.
author: stairwaytowonderland
inputs:
  github-token:
    description: GitHub token passed to semantic-release (requires repo + write access).
    required: false
    default: ''
  node-version:
    description: Node.js version to use.
    required: false
    default: '24'
  build-only:
    description: Run the build step but skip the release step (for testing).
    required: false
  manual-tag:
    description: Manually create the release tag instead of letting semantic-release do it.
    required: false
  typecheck:
    description: Run typechecking but skip the release step (for testing).
    required: false
  changelog-file:
    description: Path to the generated changelog file to commit when using manual-tag mode.
    required: false
    default: ''
  publish:
    description: Dispatch the publish workflow after a successful release.
    required: false
    default: ''
  ref:
    description: The git ref to checkout for the release, or for publish.
    required: false
    default: ${{ github.ref }}

outputs:
  new-release-published:
    description: |
      'true' if a new release was published.
    value: ${{ steps.release.outputs.new-release-published }}
  new-release-version:
    description: Version number of the new release (e.g. 1.2.3).
    value: ${{ steps.release.outputs.new-release-version }}
  new-release-git-tag:
    description: Git tag of the new release (e.g. v1.2.3).
    value: ${{ steps.release.outputs.new-release-git-tag }}
  new-release-notes:
    description: Release notes (Markdown) of the new release.
    value: ${{ steps.release.outputs.new-release-notes }}
  new-release-notes-base64:
    description: Base64-encoded release notes.
    value: ${{ steps.encode.outputs.notes_b64 }}

runs:
  using: composite
  steps:
    - name: Checkout action repository
      uses: actions/checkout@v6
      with:
        token: ${{ inputs.github-token || github.token }}
        repository: ${{ github.action_repository }}
        ref: ${{ github.action_ref }}
        path: ./.node-semantic-release
        persist-credentials: false

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Ensure package.json
      shell: bash
      run: |
        if [ ! -f package.json ]; then
          echo "::warning::package.json not found. Copying default configuration."
          cp ./.node-semantic-release/templates/package.json ./package.json
          npm install --package-lock-only
        fi

    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Build
      shell: bash
      run: npm run build

    - name: Type check
      if: inputs.typecheck == 'true'
      shell: bash
      run: npm run typecheck

    - name: Check 'semantic-release-export-data' plugin
      if: inputs.build-only != 'true'
      shell: bash
      run: |
        if ! node -e "require('semantic-release-export-data')" 2>/dev/null; then
          echo "::error::semantic-release-export-data is not installed. Add it to package.json and ensure it is listed in your semantic-release plugins (e.g. '.releaserc')."
          exit 1
        fi

    - name: Ensure .releaserc
      if: inputs.build-only != 'true'
      shell: bash
      run: |
        if [ ! -f .releaserc ]; then
          echo "::warning::.releaserc not found. Copying default configuration."
          cp ./.node-semantic-release/templates/releaserc.json ./.releaserc
        fi

    - name: Release
      if: inputs.build-only != 'true'
      id: release
      shell: bash
      run: npx semantic-release $DRY_RUN_FLAG
      env:
        GITHUB_TOKEN: ${{ inputs.github-token || github.token }}
        DRY_RUN_FLAG: ${{ inputs.manual-tag == 'true' && '--dry-run' || '' }}

    - name: Encode release notes
      if: steps.release.outputs.new-release-published == 'true'
      id: encode
      shell: bash
      # Encode the new release notes as a base64 string to safely
      # pass through the workflow dispatch fields.
      run: printf '%s' "$NOTES" | base64 -w 0 | xargs -I{} echo "notes_b64={}" >> "$GITHUB_OUTPUT"
      # The release notes from steps.release.outputs.new-release-notes
      # can contain arbitrary Markdown — newlines, special characters,
      # quotes — that would break if interpolated directly into the run
      # command via ${{ }}. Passing it through an environment variable
      # lets the shell handle it safely as a raw string.
      env:
        NOTES: ${{ steps.release.outputs.new-release-notes }}

    - name: Configure git
      if: steps.release.outputs.new-release-published == 'true' && inputs.manual-tag == 'true'
      shell: bash
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        # git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
        # git config --global user.name "${{ github.actor }}"
        # git config --global user.email "${{ github.actor }}@users.noreply.github.com"
      # env:
      #   GITHUB_TOKEN: ${{ inputs.github-token || github.token }}

    - name: Commit CHANGELOG
      if: steps.release.outputs.new-release-published == 'true' && inputs.manual-tag == 'true' && inputs.changelog-file != ''
      id: changelog_commit
      shell: bash
      run: |
        notes_file=$(mktemp)
        printf '%s' "$NOTES_B64" | base64 -d > "$notes_file"

        if [ -f "$CHANGELOG_FILE" ]; then
          cp "$CHANGELOG_FILE" "${CHANGELOG_FILE}.bak"
          {
            cat "$notes_file"
            printf '\n\n'
            cat "${CHANGELOG_FILE}.bak"
          } > "$CHANGELOG_FILE"
          rm -f "${CHANGELOG_FILE}.bak"
        else
          cat "$notes_file" > "$CHANGELOG_FILE"
        fi

        rm -f "$notes_file"

        git add "$CHANGELOG_FILE"
        if git diff --cached --quiet; then
          echo "No ${CHANGELOG_FILE} changes to commit."
        else
          git commit -m "chore(release): ${VERSION}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
        fi
        echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      env:
        VERSION: ${{ steps.release.outputs.new-release-version }}
        NOTES_B64: ${{ steps.encode.outputs.notes_b64 }}
        CHANGELOG_FILE: ${{ inputs.changelog-file }}

    - name: Create tag
      if: steps.release.outputs.new-release-git-tag != '' && inputs.manual-tag == 'true'
      shell: bash
      run: |
        {
          printf '%s' "$NOTES_B64" | base64 -d
          printf '\n'
        } > release-notes.md
        git tag -a "$TAG" "$SHA" -F release-notes.md --cleanup=verbatim
        git push origin refs/tags/$TAG
        rm -f release-notes.md
      env:
        TAG: ${{ steps.release.outputs.new-release-git-tag }}
        SHA: ${{ steps.changelog_commit.outputs.commit_sha }}
        NOTES_B64: ${{ steps.encode.outputs.notes_b64 }}

    - name: Show release information
      if: steps.release.outputs.new-release-published == 'true'
      shell: bash
      run: |
        if [ "$MANUAL_TAG" = "true" ]; then
          echo "::notice::🚀 Tag created successfully!"
        else
          echo "::notice::🚀 Release created successfully!"
        fi
        echo "> [!TIP]" >> $GITHUB_STEP_SUMMARY
        echo "> ### Release Information" >> $GITHUB_STEP_SUMMARY
        echo "> ✅ **Released version**: ${VERSION}" >> $GITHUB_STEP_SUMMARY
        echo "> 🏷️ **Git tag**: ${TAG}" >> $GITHUB_STEP_SUMMARY
        echo "> 📝 **Release Notes**:" >> $GITHUB_STEP_SUMMARY
        echo "> " >> $GITHUB_STEP_SUMMARY
        echo "::group::📝 Release Notes"
        printf "> " >> $GITHUB_STEP_SUMMARY
        while IFS= read -r line; do
          printf '%s\n' "$line" | sed 's/^/>\ /' | tee -a $GITHUB_STEP_SUMMARY
        done < <(printf '%s' "$NOTES_B64" | base64 -d)
        echo "::endgroup::"
      env:
        TAG: ${{ steps.release.outputs.new-release-git-tag }}
        VERSION: ${{ steps.release.outputs.new-release-version }}
        NOTES_B64: ${{ steps.encode.outputs.notes_b64 }}
        MANUAL_TAG: ${{ inputs.manual-tag }}

branding:
  icon: tag
  color: red
